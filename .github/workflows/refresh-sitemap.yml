name: Refresh sitemap lastmod
on:
  push:
    branches: [main]
    paths-ignore:
      - sitemap.xml
      - README.md
      - .github/workflows/**
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          if git diff --quiet sitemap.xml; then
            echo "no change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore(seo): refresh sitemap lastmod to ${TODAY}"
          git push
